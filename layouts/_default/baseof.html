<!DOCTYPE html>
<html lang="ko">
{{ partial "head.html" . }}
<body{{ if .IsHome }} class="home"{{ end }}>
{{- if .IsHome }}
  {{ block "main" . }}{{ end }}
{{- else }}
  <div class="read-progress" aria-hidden="true"><span></span></div>
  {{ partial "header.html" . }}
  <main>{{ block "main" . }}{{ end }}</main>
  {{ partial "footer.html" . }}
  <button class="to-top" type="button" aria-label="맨 위로">↑</button>
{{- end }}
  {{ $siteJs := resources.Get "js/site.js" | fingerprint }}
  <script src="{{ $siteJs.RelPermalink }}"></script>
</body>
</html>
