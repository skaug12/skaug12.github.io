{{ define "main" }}
<div class="wrap">
  <div class="page-head"><h1>{{ .Title }}</h1></div>
  <div class="list">
    {{ range .Pages }}
    <article class="item">
      <div class="idate num">{{ len .Pages }}편</div>
      <div class="ibody"><h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3></div>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
