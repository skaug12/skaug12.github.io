{{ define "main" }}
<div class="wrap">
  <div class="page-head"><h1>{{ .Title }}</h1></div>
  <div class="latest">
    <div class="list">
      {{ range .Pages }}
      <article class="item">
        <div class="tag note">{{ .Title }}</div>
        <div class="body"><h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3></div>
        <div class="date">{{ len .Pages }}편</div>
      </article>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
