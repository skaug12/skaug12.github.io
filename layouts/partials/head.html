<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{ $desc := or .Params.summary .Summary .Site.Params.description | plainify }}
<title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
<meta name="description" content="{{ $desc }}">
<meta name="author" content="{{ .Site.Params.author }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if and .IsPage (eq .Section "posts") }}article{{ else }}website{{ end }}">
{{ if and .IsPage (eq .Section "posts") }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02" }}">
<meta property="article:modified_time" content="{{ .Lastmod.Format "2006-01-02" }}">
{{ end }}
{{ with .Site.Home.OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">{{ end }}
<link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
{{ partial "jsonld.html" . }}
</head>
