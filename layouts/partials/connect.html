{{ if or .Site.Params.instagram .Site.Params.contact_form }}
<section class="connect" id="connect" aria-labelledby="connect-h">
  <div class="wrap connect-in{{ if .Site.Params.contact_form }} has-form{{ end }}">
    <div class="connect-lead">
      <p class="connect-kicker">연결하기<span class="dot">.</span></p>
      <h2 class="connect-h" id="connect-h">할 이야기가 있으신가요?</h2>
      <p class="connect-sub">글에 대한 생각이든, 협업 제안이든, 그냥 안부든 좋아요. 편한 쪽으로 남겨주세요.</p>
      {{ with .Site.Params.instagram }}
      <a class="connect-ig" href="https://ig.me/m/{{ . }}" target="_blank" rel="noopener noreferrer">
        <svg class="ig-ic" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5.4"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.5" cy="6.5" r="1.15" fill="currentColor" stroke="none"/></svg>
        <span>인스타그램으로 DM 보내기</span>
        <span class="ig-at">@{{ . }}</span>
      </a>
      {{ end }}
    </div>
    {{ with .Site.Params.contact_form }}
    <form class="connect-form" action="{{ . }}" method="POST" novalidate>
      <div class="cf-row">
        <label class="cf-field">
          <span class="cf-label">이름</span>
          <input type="text" name="{{ $.Site.Params.contact_name }}" autocomplete="name" required>
        </label>
        <label class="cf-field">
          <span class="cf-label">이메일</span>
          <input type="email" name="{{ $.Site.Params.contact_email }}" autocomplete="email" required>
        </label>
      </div>
      <label class="cf-field">
        <span class="cf-label">메시지</span>
        <textarea name="{{ $.Site.Params.contact_message }}" rows="4" required></textarea>
      </label>
      <input class="cf-hp" type="text" name="_hp" tabindex="-1" autocomplete="off" aria-hidden="true">
      <div class="cf-foot">
        <button class="cf-send" type="submit">메일 보내기</button>
        <p class="cf-status" role="status" aria-live="polite"></p>
      </div>
    </form>
    {{ end }}
  </div>
</section>
{{ end }}
